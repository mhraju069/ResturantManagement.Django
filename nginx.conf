server {
    listen 80;
    server_name localhost;
    
    # Redirect all HTTP requests to HTTPS
#     return 301 https://$host$request_uri;
# }

# server {
#     listen 443 ssl;
#     server_name api.verseai.nl;

#     ssl_certificate /etc/letsencrypt/live/api.verseai.nl/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/api.verseai.nl/privkey.pem;

    client_max_body_size 1048576M; # 1TB

    # Serve static files
    location /static/ {
        alias /app/staticfiles/;
    }

    # Serve media files
    location /media/ {
        alias /app/media/;
    }

    # WebSocket proxy
    # location /ws/ {
    #     proxy_pass http://web:8000;  
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Use Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Regular HTTP proxy
    location / {
        set $upstream_web web;
        proxy_pass http://$upstream_web:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
