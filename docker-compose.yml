services:
  web:
    build: .
    container_name: web
    command: >
      sh -c "python manage.py collectstatic --noinput && python manage.py makemigrations && python manage.py migrate && gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - .:/app
    expose:
      - "8000"
      # depends_on:
      # - redis 
      # - db
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    env_file:
      - .env

  nginx:
    image: nginx:stable
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
